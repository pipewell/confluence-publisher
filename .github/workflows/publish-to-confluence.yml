name: Publish docs to Confluence

on:
  push:
    branches: [main]
    paths: ["docs/**/*.md"]
  schedule:
    - cron: '0 7 * * 1-5'   # Mon-Fri 07:00 UTC — nightly validate-manifest run
  workflow_dispatch:
    inputs:
      sync_all:
        description: "Sync all manifest entries (not just changed files)"
        type: boolean
        default: false
      validate_only:
        description: "Run validate-manifest only (skip publish)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    name: Validate syntax
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.validate_only)
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .

      - name: Check manifest and conversion
        run: confluence-publisher check

  publish:
    name: Publish to Confluence
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .

      - name: Install Mermaid CLI
        run: |
          npm install -g @mermaid-js/mermaid-cli
          echo '{"args":["--no-sandbox"]}' > /tmp/puppeteer-config.json

      - name: Resolve changed files
        id: changed
        run: |
          if [ "${{ github.event.inputs.sync_all }}" = "true" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            FILES=$(git diff --name-only HEAD~1 HEAD -- 'docs/**/*.md' | tr '\n' ' ')
            echo "files=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        env:
          CONFLUENCE_BASE_URL: ${{ vars.CONFLUENCE_BASE_URL }}
          CONFLUENCE_MODE: ${{ vars.CONFLUENCE_MODE }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_CERT_PEM: ${{ secrets.CONFLUENCE_CERT_PEM }}
          CONFLUENCE_EMAIL: ${{ vars.CONFLUENCE_EMAIL }}
          MMDC_PUPPETEER_CFG: /tmp/puppeteer-config.json
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          if [ -z "$FILES" ]; then
            confluence-publisher sync
          else
            read -ra FILE_ARRAY <<< "$FILES"
            ARGS=()
            for f in "${FILE_ARRAY[@]}"; do
              ARGS+=(--changed-files "$f")
            done
            confluence-publisher sync "${ARGS[@]}"
          fi

      - name: Commit manifest state
        run: |
          git config user.name "confluence-publisher-bot"
          git config user.email "noreply@github.com"
          git add confluence-manifest.yaml
          git diff --cached --quiet || git commit -m "chore: update confluence-manifest state [skip ci]"
          git push

  validate:
    name: Validate manifest
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.validate_only)
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .

      - name: Validate manifest
        env:
          CONFLUENCE_BASE_URL: ${{ vars.CONFLUENCE_BASE_URL }}
          CONFLUENCE_MODE: ${{ vars.CONFLUENCE_MODE }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_CERT_PEM: ${{ secrets.CONFLUENCE_CERT_PEM }}
          CONFLUENCE_EMAIL: ${{ vars.CONFLUENCE_EMAIL }}
        run: confluence-publisher validate-manifest

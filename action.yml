name: 'pipewell-confluence-publisher'
description: 'Publish Markdown documentation from GitHub to Confluence (one-way sync)'
author: 'pipewell'

branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  operation:
    description: 'Operation to run: sync | check | validate-manifest'
    required: false
    default: 'sync'

  # Confluence connection
  confluence-base-url:
    description: 'Confluence instance URL (e.g. https://your-org.atlassian.net)'
    required: false
    default: ''
  confluence-mode:
    description: 'cloud or dc'
    required: false
    default: 'cloud'
  confluence-email:
    description: 'Login email used for Basic Auth (Cloud only)'
    required: false
    default: ''
  confluence-api-token:
    description: 'API token (Cloud) or Personal Access Token (DC)'
    required: false
    default: ''
  confluence-cert-pem:
    description: 'Base64-encoded PEM certificate for DC mTLS; leave blank for Cloud'
    required: false
    default: ''

  # Publish behaviour
  repo-root:
    description: 'Path to the directory containing confluence-manifest.yaml'
    required: false
    default: '.'
  changed-files:
    description: 'Space-separated list of changed .md files; omit to sync every manifest entry'
    required: false
    default: ''
  dry-run:
    description: 'Convert and report without making any Confluence API calls'
    required: false
    default: 'false'
  strict-conflicts:
    description: 'Exit non-zero when a Confluence page was manually edited since last publish'
    required: false
    default: 'false'

  # Tooling
  install-mermaid:
    description: 'Install @mermaid-js/mermaid-cli so Mermaid diagrams render as PNG'
    required: false
    default: 'true'
  python-version:
    description: 'Python version'
    required: false
    default: '3.11'
  package-ref:
    description: 'Git ref or branch to install (defaults to the same ref the action was called from)'
    required: false
    default: ''
  github-token:
    description: >
      GitHub token used to write the manifest back after creating new pages.
      Requires contents: write and pull-requests: write permissions.
      Defaults to the built-in GITHUB_TOKEN.
    required: false
    default: ''

outputs:
  result:
    description: 'Full stdout+stderr of the confluence-publisher command'
    value: ${{ steps.run.outputs.result }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install confluence-publisher
      shell: bash
      run: |
        REF="${{ inputs.package-ref }}"
        if [ -z "$REF" ]; then
          REF="${GITHUB_ACTION_REF:-main}"
        fi
        pip install --quiet "git+https://github.com/pipewell/confluence-publisher.git@${REF}"

    - name: Install Mermaid CLI
      if: inputs.install-mermaid == 'true' && inputs.operation == 'sync'
      shell: bash
      run: |
        npm install -g @mermaid-js/mermaid-cli --silent
        printf '{"args":["--no-sandbox"]}' > "$RUNNER_TEMP/puppeteer.json"

    - name: Run confluence-publisher
      id: run
      shell: bash
      env:
        CONFLUENCE_BASE_URL: ${{ inputs.confluence-base-url }}
        CONFLUENCE_MODE: ${{ inputs.confluence-mode }}
        CONFLUENCE_EMAIL: ${{ inputs.confluence-email }}
        CONFLUENCE_API_TOKEN: ${{ inputs.confluence-api-token }}
        CONFLUENCE_CERT_PEM: ${{ inputs.confluence-cert-pem }}
        MMDC_PUPPETEER_CFG: ${{ runner.temp }}/puppeteer.json
      run: |
        set +e
        CMD=(confluence-publisher "${{ inputs.operation }}" --repo-root "${{ inputs.repo-root }}")

        if [ "${{ inputs.operation }}" = "sync" ]; then
          [ "${{ inputs.dry-run }}" = "true" ]         && CMD+=(--dry-run)
          [ "${{ inputs.strict-conflicts }}" = "true" ] && CMD+=(--strict-conflicts)

          if [ -n "${{ inputs.changed-files }}" ]; then
            read -ra FILES <<< "${{ inputs.changed-files }}"
            for f in "${FILES[@]}"; do
              CMD+=(--changed-files "$f")
            done
          fi
        fi

        OUTPUT=$("${CMD[@]}" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"

        DELIM="EOF_$(openssl rand -hex 6)"
        {
          echo "result<<$DELIM"
          echo "$OUTPUT"
          echo "$DELIM"
        } >> "$GITHUB_OUTPUT"

        exit $EXIT_CODE

    - name: Write back manifest
      if: inputs.operation == 'sync' && inputs.dry-run != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
      run: |
        # Path to manifest relative to the repo root (strip leading ./)
        MANIFEST_REL="${{ inputs.repo-root }}/confluence-manifest.yaml"
        MANIFEST_REL="${MANIFEST_REL#./}"

        # Nothing to do if the manifest was not changed by the publish run
        if git -C "$GITHUB_WORKSPACE" diff --quiet -- "$MANIFEST_REL" 2>/dev/null; then
          echo "No new page IDs to write back."
          exit 0
        fi

        echo "New page IDs assigned — writing manifest back to $GITHUB_REF_NAME..."

        # Contents API requires the current blob SHA to update an existing file
        FILE_SHA=$(gh api "/repos/$GITHUB_REPOSITORY/contents/$MANIFEST_REL" \
          --jq '.sha' 2>/dev/null || echo "")
        CONTENT=$(base64 < "$GITHUB_WORKSPACE/$MANIFEST_REL" | tr -d '\n')

        # Attempt a direct commit via the Contents API.
        # This succeeds when branch protection grants github-actions[bot] bypass.
        if gh api \
            --method PUT \
            "/repos/$GITHUB_REPOSITORY/contents/$MANIFEST_REL" \
            -f "message=chore: update manifest with new page IDs [skip ci]" \
            -f "content=$CONTENT" \
            -f "sha=$FILE_SHA" \
            -f "branch=$GITHUB_REF_NAME" \
            --silent 2>/dev/null; then
          echo "Manifest committed directly."
          exit 0
        fi

        # Fall back: open a PR so the manifest update goes through the normal review path.
        # IMPORTANT: until this PR is merged, the next publish run will attempt to
        # re-create the same pages. Merge it promptly to avoid duplicates.
        echo "Direct commit blocked by branch protection — opening a PR instead."
        BRANCH="manifest-writeback-$(date +%s)"
        git -C "$GITHUB_WORKSPACE" config user.name "github-actions[bot]"
        git -C "$GITHUB_WORKSPACE" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git -C "$GITHUB_WORKSPACE" checkout -b "$BRANCH"
        git -C "$GITHUB_WORKSPACE" add "$MANIFEST_REL"
        git -C "$GITHUB_WORKSPACE" commit -m "chore: update manifest with new page IDs [skip ci]"
        git -C "$GITHUB_WORKSPACE" push origin "$BRANCH"
        gh pr create \
          --repo "$GITHUB_REPOSITORY" \
          --title "chore: update confluence manifest with new page IDs" \
          --body "$(cat <<'PRBODY'
New Confluence pages were created in the last publish run. This PR records their page IDs in the manifest.

**Merge this promptly.** Until it is merged, the next publish run will attempt to re-create these pages and may fail or create duplicates.

To avoid this PR in future, grant \`github-actions[bot]\` bypass permission on the branch protection rule for \`main\` in your repository settings.
PRBODY
          )" \
          --base "$GITHUB_REF_NAME" \
          --head "$BRANCH" || true
